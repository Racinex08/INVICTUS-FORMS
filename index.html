    <!-- Estilos CSS integrados para la presentación -->
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --secondary-color: #6c757d;
            --secondary-hover: #5a6268;
            --background-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333;
            --label-color: #555;
            --border-color: #ccc;
        }

        body {
            font-family: Tahoma, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(125% 125% at -2% 101%,
                    rgba(245, 87, 2, 1) 10.5%,
                    rgba(245, 120, 2, 1) 16%,
                    rgba(245, 140, 2, 1) 17.5%,
                    rgba(245, 170, 100, 1) 25%,
                    rgba(238, 174, 202, 1) 40%,
                    rgba(202, 179, 214, 1) 65%,
                    rgba(148, 201, 233, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem 0;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            color: var(--text-color);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 420px;
            width: 95%;
            box-sizing: border-box;
            position: relative;
        }

        .hidden {
            display: none;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .btn,
        .btn-primary,
        .btn-secondary {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-sizing: border-box;
        }

        .btn:active,
        .btn-primary:active,
        .btn-secondary:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        #checkBtn {
            background-color: #28a745;
            color: white;
        }

        #checkBtn:hover {
            background-color: #218838;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--label-color);
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .phone-group,
        .date-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .phone-group select {
            width: auto;
            flex-basis: 35%;
        }

        .phone-group input {
            flex-basis: 65%;
        }

        .form-actions {
            margin-top: 2rem;
        }

        .loader {
            display: none;
            flex-direction: column;
            /* Alinea el SVG y el texto verticalmente */
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: var(--text-color);
        }

        .na-btn {
            display: block;
            width: 100%;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            padding: 0.6rem;
            border-radius: 5px;
            margin-top: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: #333;
        }

        .status-message {
            padding: 2rem 0;
        }

        .status-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        .status-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .status-detail {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        #langToggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            color: #555;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
        }

        .confirmation-details {

            background-color: #f9f9f9;
            padding: 1rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            border: 1px solid #eee;
        }

        .confirmation-details p {

            margin: 0 0 0.75rem 0;

            justify-content: space-between;

        }

        .confirmation-details strong {
            color: var(--text-color);
            margin-right: 1rem;

        .confirmation-details span {

            gap: 0.75rem;

        .back-button-styled {
            all: unset;
            box-sizing: border-box;
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            height: 3rem;
            width: 3rem;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            font-family: Segoe UI, sans-serif;
            font-size: 1.2rem;
            font-weight: 640;
            color: #1d1d1f;
            z-index: 10;
        }

        .back-button-styled .button-bg {
            border-color: rgba(255, 208, 116);
            background-color: rgba(255, 208, 116);
        }

        .back-button-styled .button-inner,
        .back-button-styled .button-inner-hover,
        .back-button-styled .button-inner-static {
            pointer-events: none;
            display: block;
        }

        .back-button-styled .button-inner {
            position: relative;
        }

        .back-button-styled .button-inner-hover {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transform: translateY(70%);
        }

        .back-button-styled .button-bg {
            overflow: hidden;
            border-radius: 2rem;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1);
            transition: transform 1.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .back-button-styled .button-bg,
        .back-button-styled .button-bg-layer,
        .back-button-styled .button-bg-layers {
            display: block;
        }

        .back-button-styled .button-bg-layers {
            position: absolute;
            left: 50%;
            transform: translate(-50%);
            top: -60%;
            aspect-ratio: 1 / 1;
            width: max(200%, 10rem);
        }

        .back-button-styled .button-bg-layer {
            border-radius: 9999px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(0);
        }

        .back-button-styled .button-bg-layer.-purple {
            background-color: rgba(163, 116, 255);
        }

        .back-button-styled .button-bg-layer.-turquoise {
            background-color: rgba(23, 241, 209);
        }

        .back-button-styled .button-bg-layer.-yellow {
            --tw-bg-opacity: 1;
            background-color: rgba(255, 208, 116, var(--tw-bg-opacity));
        }

        .back-button-styled:hover .button-inner-static {
            opacity: 0;
            transform: translateY(-70%);
            transition: transform 1.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s linear;
        }

        .back-button-styled:hover .button-inner-hover {
            opacity: 1;
            transform: translateY(0);
            transition: transform 1.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 1.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .back-button-styled:hover .button-bg-layer {
            transition: transform 1.3s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s linear;
        }

        .back-button-styled:hover .button-bg-layer-1 {
            transform: scale(1);
        }

        .back-button-styled:hover .button-bg-layer-2 {
            transition-delay: 0.1s;
            transform: scale(1);
        }

        .back-button-styled:hover .button-bg-layer-3 {
            transition-delay: 0.2s;
            transform: scale(1);
        }

        /* --- INICIO ESTILOS NUEVO LOADER --- */
        .loader-svg {
            /* Renombrado para evitar conflictos */
            width: 6em;
            height: 6em;
        }

        .loader-ring {
            animation: ringA 2s linear infinite;
        }

        .loader-ring-a {
            stroke: #9708F4;
        }

        .loader-ring-b {
            animation-name: ringB;
            stroke: #5E14E4;
        }

        .loader-ring-c {
            animation-name: ringC;
            stroke: #9708F4;
        }

        .loader-ring-d {
            animation-name: ringD;
            stroke: #5E14E4;
        }

        @keyframes ringA {

            from,
            4% {
                stroke-dasharray: 0 660;
                stroke-width: 20;
                stroke-dashoffset: -330;
            }

            12% {
                stroke-dasharray: 60 600;
                stroke-width: 30;
                stroke-dashoffset: -335;
            }

            32% {
                stroke-dasharray: 60 600;
                stroke-width: 30;
                stroke-dashoffset: -595;
            }

            40%,
            54% {
                stroke-dasharray: 0 660;
                stroke-width: 20;

        async function submitData(formData, formElement) {
            const loaderId = formElement.id === 'regForm' ? 'registerLoader' : 'attendanceLoader';
            showLoader(loaderId, true);

            if (!navigator.onLine) {
                saveForLater(formData, formElement);
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success || result.name) {
                    const t = translations[currentLang];
                    let title, detail;
                    const gender = result.gender || formData.genero;

                    if (formData.action === 'register') {
                        title = t.successTitle;
                        detail = t.registrationSuccess;

                        // La App genera la notificación del conector (asignado por el backend)
                        const notifMsg = `🔔 A ${result.conector} se le asignó como conector a ${result.name}`;

                        // Disparar notificaciones locales inmediatas
                        showPushNotification(notifMsg);

                        // Enviar notificación a la hoja para la campana de los demás
                        fetch(SCRIPT_URL, {
                            method: 'POST',
                            mode: 'cors',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: 'addNotification', mensaje: notifMsg, fecha: new Date().toISOString() })
                        }).then(() => fetchNotifications());

                    } else {
                        title = t.welcomeBackTitle;
                        detail = t.attendanceSuccess;

                        // La App detecta la 4ta asistencia
                        if (result.total === 4) {
                            const notifMsg = `⭐ ${result.name} cumplió su 4ta asistencia`;

                            // Disparar notificaciones locales inmediatas
                            showPushNotification(notifMsg);

                            // Enviar notificación a la hoja para la campana de los demás
                            fetch(SCRIPT_URL, {
                                method: 'POST',
                                mode: 'cors',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'addNotification', mensaje: notifMsg, fecha: new Date().toISOString() })
                            }).then(() => fetchNotifications());
                        }
                    }

                    detail = detail.replace('{name}', result.name);

                    // Ajuste de género en español
                    if (currentLang === 'es' && gender) {
                        if (gender.toUpperCase() === 'M') {
                            detail = detail.replace(/Bienvenido\/a|Bienvenida/g, 'Bienvenido');
                        } else if (gender.toUpperCase() === 'F') {
                            detail = detail.replace(/Bienvenido\/a|Bienvenida/g, 'Bienvenida');
                        }
                    }

                    showSuccess(title, detail);
                } else {
                    const defaultError = (formData.action === 'register') ? 'registrationError' : 'attendanceError';
                    showError(result.error || defaultError);
                }
            } catch (error) {
                console.error("Submit Error:", error);
                const defaultError = (formData.action === 'register') ? 'registrationError' : 'attendanceError';
                showError(defaultError);
            } finally {
                showLoader(loaderId, false);
                formElement.reset();
            }
        }
        function saveForLater(formData, formElement) { const queue = JSON.parse(localStorage.getItem('offlineQueue')) || []; queue.push(formData); localStorage.setItem('offlineQueue', JSON.stringify(queue)); const loaderId = formElement.id === 'regForm' ? 'registerLoader' : 'attendanceLoader'; showLoader(loaderId, false); formElement.reset(); const t = translations[currentLang]; document.getElementById('successIcon').textContent = '💾'; showSuccess(t.offlineTitle, t.offlineDetail, false); }

        function formatPhoneNumber(input, countryCode) {
            if (input.value.toUpperCase() === 'N/A') return;

            const country = countryCodes.find(c => c.code === countryCode);
            if (!country || !country.format) {
                input.value = input.value.replace(/[^\d]/g, '');
                return;
            }

            const format = country.format;
            const maxLength = format.reduce((a, b) => a + b, 0);

            let digits = input.value.replace(/\D/g, '');
            if (digits.length > maxLength) {
                digits = digits.slice(0, maxLength);
            }

            const parts = [];
            let start = 0;
            for (const len of format) {
                const part = digits.slice(start, start + len);
                if (part.length > 0) {
                    parts.push(part);
                    start += len;
                } else {
                    break;
                }
            }
            input.value = parts.join('-');
        }

        async function showPushNotification(mensaje) {
            console.log("Intentando mostrar notificación:", mensaje);

            // 1. Intentar por el Motor del Celular (Más rápido y directo)
            if ('serviceWorker' in navigator && Notification.permission === "granted") {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    // Usamos el showNotification del Service Worker para garantizar vibración en Android
                    registration.showNotification("INVICTUS JUVENIL", {
                        body: mensaje,
                        icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png',
                        vibrate: [300, 100, 300],
                        badge: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png',
                        tag: 'invictus-alert',
                        renotify: true
                    });
                } catch (e) {
                    console.error("Fallo Service Worker Notif, usando fallback", e);
                    new Notification("INVICTUS JUVENIL", { body: mensaje });
                }
            } else {
                // 2. Si el motor falla o no está listo, intentar por alerta clásica
                if (Notification.permission === "granted") {
                    new Notification("INVICTUS JUVENIL", { body: mensaje });
                } else {
                    // Solo mostramos alert si el usuario ya intentó activarlas
                    console.log("Permiso no concedido o pendiente.");
                }
            }
            lastSeenNotify = mensaje;
            localStorage.setItem('lastSeenNotify', mensaje);
        }

        async function fetchNotifications() {
            function formatSmartDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';

                const now = new Date();
                const options = { timeZone: 'America/Panama' };

                // Normalizar "Hoy" y "Ayer" en zona horaria de Panamá
                const toPanamaDateStr = (date) => date.toLocaleDateString('en-CA', options); // YYYY-MM-DD

                const dStr = toPanamaDateStr(d);
                const nowStr = toPanamaDateStr(now);

                const yesterday = new Date(now);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = toPanamaDateStr(yesterday);

                const timeStr = d.toLocaleTimeString('es-PA', { ...options, hour: '2-digit', minute: '2-digit', hour12: true });

                if (dStr === nowStr) {
                    return `Hoy - ${timeStr}`;
                } else if (dStr === yesterdayStr) {
                    return `Ayer - ${timeStr}`;
                } else {
                    // Formato completo: Ej. "Lunes, 12 Ene 2026 - 10:30 p. m."
                    // El usuario pidió "dia fecha y año y hora".
                    const datePart = d.toLocaleDateString('es-PA', { ...options, weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
                    return `${datePart} - ${timeStr}`;
                }
            }

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getNotifications' })
                });
                const result = await response.json();
                if (result.success && result.notifications && result.notifications.length > 0) {
                    redDot.classList.remove('hidden');

                    const latestMsg = result.notifications[0].mensaje;
                    // Solo disparar push si es un mensaje que no hemos visto
                    if (latestMsg !== lastSeenNotify) {
                        showPushNotification(latestMsg);
                        lastSeenNotify = latestMsg;
                        localStorage.setItem('lastSeenNotify', latestMsg);
                    }

                    notifItems.innerHTML = result.notifications.map((n) => `
                        <div class="notification-item" style="font-size: 13px; padding: 10px 0; border-bottom: 1px solid #f9f9f9; line-height: 1.4; color: #444; text-align: left; position: relative;">
                            <small style="display:block; color:#999; margin-bottom:2px; font-size:11px; font-weight:bold;">${formatSmartDate(n.fecha)}</small>
                            <span style="display: block; padding-right: 25px;">${n.mensaje}</span>
                            <button onclick="removeNotification('${n.mensaje}', this.parentElement)" style="position: absolute; top: 10px; right: 0; background: none; border: none; color: #bbb; cursor: pointer; font-size: 16px; padding: 0 5px;">✕</button>
                        </div>
                    `).join('');
                } else {
                    redDot.classList.add('hidden');
                    notifItems.innerHTML = '<p style="color: #888; font-size: 14px;">No hay alertas nuevas...</p>';
                }
            } catch (e) { console.log("Error cargando notificaciones"); }
        }

        async function removeNotification(mensaje, element) {

            if (element) {

            } catch (e) {
                console.log("Error eliminando notificación");
                fetchNotifications(); // Si falla, que vuelvan a aparecer
            }
        }
